<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="todo-app">
            <div class="header">
                <h1>📝 Мои Задачи</h1>
                <p class="subtitle">Организуйте свою жизнь</p>
            </div>
            
            <div class="input-section">
                <input 
                    type="text" 
                    id="taskInput" 
                    placeholder="Добавьте новую задачу..." 
                    class="task-input"
                >
                <button id="addBtn" class="add-btn">
                    <span>+</span>
                </button>
            </div>

            <div class="filter-section">
                <button class="filter-btn active" data-filter="all">Все</button>
                <button class="filter-btn" data-filter="active">Активные</button>
                <button class="filter-btn" data-filter="completed">Выполненные</button>
            </div>

            <div class="stats">
                <span id="taskCount">0 задач</span>
                <button id="clearCompleted" class="clear-btn">Очистить выполненные</button>
            </div>

            <ul id="taskList" class="task-list"></ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
